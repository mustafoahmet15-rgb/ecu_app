<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ECU - Electro Club Uzbekistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-[#0b1120] text-white">

    <div id="app" class="p-4 pb-28">
        
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <span class="text-4xl font-black italic tracking-tighter text-cyan-400 ecu-logo">ECU</span>
                <div class="h-8 w-[1px] bg-slate-700"></div>
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-[0.2em] text-gray-400 leading-none font-semibold">Electro Club</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-white font-bold">Uzbekistan</span>
                </div>
            </div>
            <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center border border-white/10">
                <i class="fa-solid fa-microchip text-cyan-400 text-xl"></i>
            </div>
        </header>

        <div id="dashboard" class="page">
            <div class="relative mb-6 group">
                <div class="absolute inset-0 bg-cyan-500/10 rounded-3xl blur-xl group-hover:bg-cyan-500/20 transition"></div>
                <img src="images/BYD.jpg.jpg" alt="BYD Service" class="relative w-full rounded-3xl object-cover h-52 border border-white/10 shadow-2xl">
                <div class="absolute bottom-4 left-4">
                    <h2 class="text-xl font-bold mb-2">BYD Service</h2>
                    <button onclick="navigateTo('catalog')" class="btn-primary px-6 py-2 rounded-xl text-black font-bold text-xs uppercase">
                        Katalogga o'tish
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="glass p-5 rounded-[2rem] border border-white/5">
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1">Zaryadlash</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-3xl font-extrabold text-cyan-400">215</span>
                        <span class="text-xs text-cyan-400/60 font-bold italic">km</span>
                    </div>
                    <i class="fa-solid fa-bolt-lightning mt-3 text-cyan-500/50"></i>
                </div>
                <div class="glass p-5 rounded-[2rem] border border-white/5">
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1">Harorat</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-3xl font-extrabold">22°</span>
                        <span class="text-xs text-yellow-500 font-bold italic">C</span>
                    </div>
                    <i class="fa-solid fa-temperature-half mt-3 text-yellow-500/50"></i>
                </div>
            </div>

            <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5">
                <div>
                    <p class="text-sm text-gray-400">Klub hisobi</p>
                    <p class="text-2xl font-black neon-text">$ 512.00</p>
                </div>
                <div class="w-14 h-14 rounded-2xl bg-cyan-500/10 flex items-center justify-center border border-cyan-500/20">
                    <i class="fa-solid fa-wallet text-cyan-400 text-xl"></i>
                </div>
            </div>
        </div>
        <div id="catalog" class="page hidden">
            <h2 class="text-2xl font-black mb-6 italic">ZAPCHASLAR</h2>
            <div id="product-grid" class="grid grid-cols-1 gap-4">
                </div>
        </div>

    </div>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[2.5rem] flex justify-around items-center border border-white/10 shadow-2xl z-50">
        <button onclick="navigateTo('dashboard')" class="nav-item active text-2xl"><i class="fa-solid fa-house"></i></button>
        <button onclick="navigateTo('catalog')" class="nav-item text-gray-500 text-2xl"><i class="fa-solid fa-car-battery"></i></button>
        <button class="nav-item text-gray-500 text-2xl"><i class="fa-solid fa-cart-shopping"></i></button>
        <button class="nav-item text-gray-500 text-2xl"><i class="fa-solid fa-user"></i></button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
